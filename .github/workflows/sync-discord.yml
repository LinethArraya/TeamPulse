name: Sync dailies from Discord

on:
  # Corre unas veces al día (UTC). Ajusta las horas a tu zona horaria.
  # 13:00, 17:00 y 22:00 UTC ≈ 7am, 11am y 4pm en UTC-6.
  schedule:
    - cron: '0 13 * * *'
    - cron: '0 17 * * *'
    - cron: '0 22 * * *'
  # Permite ejecutarlo a mano desde la pestaña Actions.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-discord
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch dailies and build data.json
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: node scripts/sync-discord.mjs

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Sin cambios en data.json."
          else
            git commit -m "chore: sync dailies from Discord"
            git push
          fi

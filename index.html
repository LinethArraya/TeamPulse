<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pulso de Equipo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg: #12161B;
    --panel: #1B2129;
    --line: #2A323C;
    --text: #E9EDF1;
    --muted: #8B96A3;
    --accent: #FF8A5B;
    --ok: #6FE3A6;
    --yesterday: #8B96A3;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    padding: 32px 5vw 80px;
    min-height: 100vh;
  }
  .wrap{ max-width: 1040px; margin: 0 auto; }

  header{
    display:flex; justify-content:space-between; align-items:flex-end;
    margin-bottom: 28px; gap: 20px; flex-wrap: wrap;
  }
  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 30px; font-weight: 700; margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .sub{ color: var(--muted); font-size: 14px; margin:0; }
  .week-tag{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 14px; white-space: nowrap;
  }

  .stats{
    display:grid; grid-template-columns: repeat(3,1fr); gap: 10px;
    margin-bottom: 28px;
  }
  .stat{
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px 16px;
  }
  .stat .n{ font-family:'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; }
  .stat.accent .n{ color: var(--accent); }
  .stat.ok .n{ color: var(--ok); }
  .stat .l{ font-size: 12px; color: var(--muted); margin-top: 2px; }

  .board{ display:flex; flex-direction:column; gap: 12px; }

  .card{
    background: var(--panel); border:1px solid var(--line);
    border-radius: 14px; padding: 18px 20px;
    display:grid; grid-template-columns: 1fr; gap: 16px;
  }

  .who{ display:flex; align-items:center; gap: 12px; flex-wrap: wrap; }
  .avatar{
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(255,138,91,.14); color: var(--accent);
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px;
    flex-shrink: 0;
  }
  .name{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:16px; }
  .proj{
    font-size: 12px; color: var(--accent); background: rgba(255,138,91,.12);
    display:inline-block; padding: 3px 9px; border-radius: 6px;
  }
  .posted{ font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin-left:auto; }

  .cols{ display:grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 720px){ .cols{ grid-template-columns: 1fr; } }

  .col h3{
    font-family:'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin: 0 0 10px;
  }
  .col.today h3{ color: var(--accent); }
  ul{ list-style: none; margin: 0; padding: 0; display:flex; flex-direction:column; gap: 8px; }
  li{
    font-size: 13px; line-height: 1.45; color: var(--text);
    padding-left: 18px; position: relative;
  }
  li::before{
    content: ''; position: absolute; left: 2px; top: 7px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--line);
  }
  .col.today li::before{ background: var(--accent); }
  .col.yesterday li{ color: var(--muted); }
  .col .none{ font-size: 13px; color: var(--muted); font-style: italic; padding-left: 18px; }

  .empty{
    text-align:center; padding: 60px 20px; color: var(--muted);
    border: 1px dashed var(--line); border-radius: 14px; font-size: 14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Pulso de Equipo</h1>
      <p class="sub">Dailies del equipo, sincronizados automáticamente desde Discord.</p>
    </div>
    <span class="week-tag" id="updatedTag">Cargando…</span>
  </header>

  <div class="stats" id="stats"></div>
  <div class="board" id="board"></div>
</div>

<script>
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function initials(name, code){
  const parts = (name || '').trim().split(/\s+/).filter(Boolean);
  if(parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  if(parts.length === 1 && parts[0].length >= 2) return parts[0].slice(0,2).toUpperCase();
  return (code || '?').slice(0,2).toUpperCase();
}

function fmtUpdated(iso){
  if(!iso) return '';
  const d = new Date(iso);
  if(isNaN(d)) return '';
  return d.toLocaleString('es-ES', {
    day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'
  }).replace('.','');
}

function taskList(tasks){
  if(!tasks || tasks.length === 0){
    return '<div class="none">Sin registro</div>';
  }
  return '<ul>' + tasks.map(t => `<li>${escapeHtml(t)}</li>`).join('') + '</ul>';
}

function render(data){
  const people = (data && data.people) || [];

  document.getElementById('updatedTag').textContent =
    data.updatedAt ? `Actualizado ${fmtUpdated(data.updatedAt)}` : '';

  const totalToday = people.reduce((n,p)=> n + ((p.today||[]).length), 0);
  const reported = people.filter(p => (p.today||[]).length > 0).length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="n">${people.length}</div><div class="l">Recursos con daily</div></div>
    <div class="stat ok"><div class="n">${reported}</div><div class="l">Reportaron hoy</div></div>
    <div class="stat accent"><div class="n">${totalToday}</div><div class="l">Tareas para hoy</div></div>
  `;

  const board = document.getElementById('board');
  if(people.length === 0){
    board.innerHTML = `<div class="empty">Aún no hay dailies. En cuanto el equipo publique en Discord y corra la sincronización, aparecerán aquí.</div>`;
    return;
  }

  board.innerHTML = people.map(p => `
    <div class="card">
      <div class="who">
        <div class="avatar">${escapeHtml(initials(p.name, p.code))}</div>
        <div>
          <div class="name">${escapeHtml(p.name || p.code)}</div>
          ${p.project ? `<span class="proj">${escapeHtml(p.project)}</span>` : ''}
        </div>
        ${p.postedAt ? `<span class="posted">${escapeHtml(fmtUpdated(p.postedAt))}</span>` : ''}
      </div>
      <div class="cols">
        <div class="col yesterday">
          <h3>Ayer${p.yesterdayLabel ? ' · ' + escapeHtml(p.yesterdayLabel) : ''}</h3>
          ${taskList(p.yesterday)}
        </div>
        <div class="col today">
          <h3>Hoy</h3>
          ${taskList(p.today)}
        </div>
      </div>
    </div>
  `).join('');
}

async function load(){
  try{
    const res = await fetch('./data.json?_=' + Date.now());
    if(!res.ok) throw new Error('HTTP ' + res.status);
    render(await res.json());
  }catch(e){
    console.error('No se pudo cargar data.json', e);
    render({ people: [] });
    document.getElementById('updatedTag').textContent = 'Sin datos';
  }
}

load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pulso de Equipo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg: #12161B;
    --panel: #1B2129;
    --panel-hover: #212832;
    --line: #2A323C;
    --text: #E9EDF1;
    --muted: #8B96A3;
    --accent: #FF8A5B;
    --ok: #6FE3A6;
    --risk: #FFC168;
    --blocked: #FF6B6B;
    --none: #333C46;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    padding: 32px 5vw 80px;
    min-height: 100vh;
  }
  .wrap{ max-width: 1040px; margin: 0 auto; }

  header{
    display:flex; justify-content:space-between; align-items:flex-end;
    margin-bottom: 28px; gap: 20px; flex-wrap: wrap;
  }
  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 30px; font-weight: 700; margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .sub{ color: var(--muted); font-size: 14px; margin:0; }
  .week-tag{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 14px; white-space: nowrap;
  }

  .stats{
    display:grid; grid-template-columns: repeat(4,1fr); gap: 10px;
    margin-bottom: 28px;
  }
  .stat{
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px 16px;
  }
  .stat .n{ font-family:'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; }
  .stat .l{ font-size: 12px; color: var(--muted); margin-top: 2px; }
  .stat.ok .n{ color: var(--ok); }
  .stat.risk .n{ color: var(--risk); }
  .stat.blocked .n{ color: var(--blocked); }
  .stat.pending .n{ color: var(--muted); }

  .add-btn{
    background: var(--accent); color: #1A1204; border:none;
    font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px;
    padding: 10px 18px; border-radius: 10px; cursor:pointer;
    transition: transform .12s ease, filter .12s ease;
  }
  .add-btn:hover{ filter: brightness(1.08); transform: translateY(-1px); }

  .board{ display:flex; flex-direction:column; gap: 12px; }

  .card{
    background: var(--panel); border:1px solid var(--line);
    border-radius: 14px; padding: 18px 20px;
    display:grid; grid-template-columns: 1.1fr 1.3fr auto; gap: 18px; align-items:center;
  }
  @media (max-width: 780px){
    .card{ grid-template-columns: 1fr; }
  }

  .who{ display:flex; flex-direction:column; gap: 6px; }
  .name{ font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:16px; }
  .proj{
    font-size: 12px; color: var(--accent); background: rgba(255,138,91,.12);
    display:inline-block; padding: 3px 9px; border-radius: 6px; width:fit-content;
    cursor:text;
  }
  .goal{
    font-size: 13px; color: var(--muted); line-height:1.4; cursor:text;
  }
  .editable:hover{ outline: 1px dashed var(--line); outline-offset: 3px; }
  .editable[contenteditable="true"]{ outline: 1px solid var(--accent); outline-offset: 3px; }

  .pulse{ display:flex; gap: 7px; align-items:center; }
  .day{ display:flex; flex-direction:column; align-items:center; gap:5px; }
  .day .d-label{ font-family:'JetBrains Mono', monospace; font-size:10px; color: var(--muted); }
  .dot{
    width: 22px; height:22px; border-radius:50%;
    border: 2px solid var(--none); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: transform .1s ease, box-shadow .15s ease;
    background: transparent;
  }
  .dot:hover{ transform: scale(1.12); }
  .dot.today{ box-shadow: 0 0 0 3px rgba(255,138,91,.18); }
  .dot.ok{ background: var(--ok); border-color: var(--ok); }
  .dot.risk{ background: var(--risk); border-color: var(--risk); }
  .dot.blocked{ background: var(--blocked); border-color: var(--blocked); }

  .del{
    background:none; border:none; color: var(--muted); cursor:pointer;
    font-size: 12px; padding: 4px 6px; border-radius:6px;
  }
  .del:hover{ color: var(--blocked); background: rgba(255,107,107,.1); }
  .card-foot{ display:flex; justify-content:flex-end; margin-top: -6px; }

  .empty{
    text-align:center; padding: 60px 20px; color: var(--muted);
    border: 1px dashed var(--line); border-radius: 14px; font-size: 14px;
  }

  .lock-btn{
    background: transparent; color: var(--muted); border: 1px solid var(--line);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    padding: 9px 14px; border-radius: 10px; cursor:pointer;
  }
  .lock-btn.unlocked{ color: var(--ok); border-color: var(--ok); }
  .lock-hint{
    font-size: 12px; color: var(--muted); margin: -18px 0 24px;
  }
  .lock-hint.hidden{ display:none; }
  .dot.locked, .editable.locked{ cursor: default; }

  .legend{
    display:flex; gap:18px; margin-top: 26px; flex-wrap:wrap;
    font-size: 12px; color: var(--muted);
  }
  .legend span{ display:inline-flex; align-items:center; gap:6px; }
  .legend i{ width:10px; height:10px; border-radius:50%; display:inline-block; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Pulso de Equipo</h1>
      <p class="sub">Recursos, proyectos y meta semanal — el punto de hoy dice si va en progreso.</p>
    </div>
    <div style="display:flex; gap:12px; align-items:center;">
      <span class="week-tag" id="weekTag"></span>
      <button class="add-btn" id="addBtn" style="display:none;">+ Agregar recurso</button>
      <button class="lock-btn" id="lockBtn">🔒 Solo vista</button>
    </div>
  </header>
  <p class="lock-hint" id="lockHint">Estás viendo el tablero en modo lectura. Solo quien tenga el PIN puede editar.</p>

  <div class="stats" id="stats"></div>
  <div class="board" id="board"></div>

  <div class="legend">
    <span><i style="background:var(--ok)"></i> En progreso</span>
    <span><i style="background:var(--risk)"></i> En riesgo</span>
    <span><i style="background:var(--blocked)"></i> Bloqueada</span>
    <span><i style="background:var(--none); border:1px solid var(--line)"></i> Sin registro</span>
  </div>
</div>

<script>
const STORAGE_KEY = 'pulso-equipo-recursos';
const EDIT_PIN = '2026'; // Cambiá este código por el que quieras usar como manager
let resources = [];
let editMode = false;
const DAY_LABELS = ['L','M','M','J','V','S','D'];
const STATUS_ORDER = ['none','ok','risk','blocked'];

function toDateStr(d){ return d.toISOString().slice(0,10); }

function getWeekDates(){
  const now = new Date();
  const day = (now.getDay() + 6) % 7; // 0 = Monday
  const monday = new Date(now);
  monday.setDate(now.getDate() - day);
  const dates = [];
  for(let i=0;i<7;i++){
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    dates.push(toDateStr(d));
  }
  return dates;
}

function fmtWeekTag(dates){
  const opts = {day:'2-digit', month:'short'};
  const start = new Date(dates[0]);
  const end = new Date(dates[6]);
  const f = (d)=> d.toLocaleDateString('es-ES', opts).replace('.','');
  return `Semana ${f(start)} — ${f(end)}`;
}

async function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    resources = raw ? JSON.parse(raw) : seedData();
  }catch(e){
    resources = seedData();
  }
  render();
}

function seedData(){
  return [
    { id: cryptoId(), name: 'María López', project: 'App Móvil', goal: 'Terminar flujo de pago y dejarlo en QA', checkins:{} },
    { id: cryptoId(), name: 'Jorge Paz', project: 'Migración de Datos', goal: 'Validar 3 tablas críticas y documentar diferencias', checkins:{} }
  ];
}

function cryptoId(){ return 'r' + Math.random().toString(36).slice(2,10); }

async function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(resources));
  }catch(e){
    console.error('No se pudo guardar', e);
  }
}

function computeStats(dates){
  const today = dates[new Date().getDay()===0?6:((new Date().getDay()+6)%7)];
  let ok=0, risk=0, blocked=0, pending=0;
  resources.forEach(r=>{
    const s = r.checkins[today] || 'none';
    if(s==='ok') ok++; else if(s==='risk') risk++; else if(s==='blocked') blocked++; else pending++;
  });
  return {ok,risk,blocked,pending};
}

function render(){
  const dates = getWeekDates();
  document.getElementById('weekTag').textContent = fmtWeekTag(dates);

  const todayIdx = (new Date().getDay()+6)%7;
  const todayStr = dates[todayIdx];

  const s = computeStats(dates);
  document.getElementById('stats').innerHTML = `
    <div class="stat ok"><div class="n">${s.ok}</div><div class="l">En progreso hoy</div></div>
    <div class="stat risk"><div class="n">${s.risk}</div><div class="l">En riesgo hoy</div></div>
    <div class="stat blocked"><div class="n">${s.blocked}</div><div class="l">Bloqueadas hoy</div></div>
    <div class="stat pending"><div class="n">${s.pending}</div><div class="l">Sin registrar hoy</div></div>
  `;

  const board = document.getElementById('board');
  if(resources.length === 0){
    board.innerHTML = `<div class="empty">Aún no hay recursos. Agrega el primero para empezar a ver su meta semanal y el pulso diario.</div>`;
    return;
  }

  board.innerHTML = resources.map(r => `
    <div class="card" data-id="${r.id}">
      <div class="who">
        <div class="name editable ${editMode?'':'locked'}" contenteditable="false" data-field="name">${escapeHtml(r.name)}</div>
        <div class="proj editable ${editMode?'':'locked'}" contenteditable="false" data-field="project">${escapeHtml(r.project)}</div>
      </div>
      <div class="goal editable ${editMode?'':'locked'}" contenteditable="false" data-field="goal">${escapeHtml(r.goal)}</div>
      <div>
        <div class="pulse">
          ${dates.map((d,i)=>{
            const status = r.checkins[d] || 'none';
            const isToday = d === todayStr;
            return `<div class="day">
              <div class="d-label">${DAY_LABELS[i]}</div>
              <div class="dot ${status} ${isToday?'today':''} ${editMode?'':'locked'}" data-date="${d}" title="${d}"></div>
            </div>`;
          }).join('')}
        </div>
        ${editMode ? `<div class="card-foot"><button class="del">Eliminar</button></div>` : ''}
      </div>
    </div>
  `).join('');

  attachHandlers();
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function attachHandlers(){
  if(!editMode) return;
  document.querySelectorAll('.card').forEach(card=>{
    const id = card.dataset.id;
    const resource = resources.find(r=>r.id===id);

    card.querySelectorAll('.editable').forEach(el=>{
      el.addEventListener('click', ()=>{
        if(el.getAttribute('contenteditable')==='true') return;
        el.setAttribute('contenteditable','true');
        el.focus();
        document.execCommand('selectAll', false, null);
      });
      el.addEventListener('blur', ()=>{
        el.setAttribute('contenteditable','false');
        resource[el.dataset.field] = el.textContent.trim();
        saveData();
      });
      el.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter'){ e.preventDefault(); el.blur(); }
      });
    });

    card.querySelectorAll('.dot').forEach(dot=>{
      dot.addEventListener('click', ()=>{
        const date = dot.dataset.date;
        const current = resource.checkins[date] || 'none';
        const next = STATUS_ORDER[(STATUS_ORDER.indexOf(current)+1) % STATUS_ORDER.length];
        if(next === 'none'){ delete resource.checkins[date]; }
        else{ resource.checkins[date] = next; }
        saveData();
        render();
      });
    });

    card.querySelector('.del').addEventListener('click', ()=>{
      resources = resources.filter(r=>r.id!==id);
      saveData();
      render();
    });
  });
}

document.getElementById('addBtn').addEventListener('click', ()=>{
  resources.push({ id: cryptoId(), name: 'Nuevo recurso', project: 'Proyecto', goal: 'Definir meta de la semana', checkins:{} });
  saveData();
  render();
});

const lockBtn = document.getElementById('lockBtn');
const addBtn = document.getElementById('addBtn');
const lockHint = document.getElementById('lockHint');

function updateLockUI(){
  if(editMode){
    lockBtn.textContent = '🔓 Modo edición';
    lockBtn.classList.add('unlocked');
    addBtn.style.display = 'inline-block';
    lockHint.classList.add('hidden');
  }else{
    lockBtn.textContent = '🔒 Solo vista';
    lockBtn.classList.remove('unlocked');
    addBtn.style.display = 'none';
    lockHint.classList.remove('hidden');
  }
}

lockBtn.addEventListener('click', ()=>{
  if(editMode){
    editMode = false;
    updateLockUI();
    render();
    return;
  }
  const input = prompt('Ingresá el PIN de edición:');
  if(input === EDIT_PIN){
    editMode = true;
    updateLockUI();
    render();
  }else if(input !== null){
    alert('PIN incorrecto.');
  }
});

updateLockUI();
loadData();
</script>
</body>
</html>
